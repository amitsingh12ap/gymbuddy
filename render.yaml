services:
  - type: web
    name: gymbuddy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: amitsingh12ap/gymbuddy
